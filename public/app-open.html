<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Opening Alexandria…</title>
<style>
  :root{ --bg:#0f172a; --card:#1e293b; --fg:#f1f5f9; --mut:#94a3b8; --bd:#334155;
         --accent:#818cf8; --accent-fg:#0f172a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);
       font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
       display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased}
  .card{max-width:440px;width:100%;background:var(--card);border:1px solid var(--bd);
        border-radius:18px;padding:32px 28px;text-align:center}
  .logo{width:56px;height:56px;border-radius:15px;background:var(--accent);color:var(--accent-fg);
        display:grid;place-items:center;font-weight:800;font-size:30px;margin:0 auto 18px}
  h1{font-size:20px;font-weight:700;letter-spacing:-.02em;margin:0 0 6px}
  p{color:var(--mut);font-size:14px;line-height:1.55;margin:0 0 22px}
  .what{color:var(--fg);font-weight:600}
  a.btn{display:block;text-decoration:none;font-size:14.5px;font-weight:650;
        border-radius:11px;padding:13px 16px;margin-top:10px}
  .primary{background:var(--accent);color:var(--accent-fg)}
  .ghost{background:transparent;color:var(--fg);border:1px solid var(--bd)}
  .sub{margin-top:20px;font-size:12.5px;color:var(--mut)}
  .sub a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">A</div>
    <h1 id="title">Opening Alexandria…</h1>
    <p id="desc">If the app is installed, it should open now.<br />
      <span id="what"></span></p>
    <a class="btn primary" id="openBtn" href="#">Open in Alexandria</a>
    <a class="btn ghost" href="https://github.com/ifftu-dev/alexandria/releases/latest">Download the app</a>
    <div class="sub">Don't have it yet? <a href="/">Learn about Alexandria</a></div>
  </div>
<script>
(function () {
  // This interstitial only renders when the OS did NOT hand the link to an
  // installed app (unverified / not installed). Rebuild the custom-scheme URL
  // from the path the visitor actually requested (Netlify rewrites the app
  // paths here with a 200, so location keeps the original path + query).
  var KNOWN = { guardian: 1, course: 1, classroom: 1, open: 1 };
  var path = location.pathname.replace(/^\/+/, '');       // e.g. "guardian/accept"
  var first = path.split('/')[0];
  var human = {
    guardian: 'You were invited as a guardian.',
    course: 'Someone shared a course with you.',
    classroom: 'You were invited to a classroom.',
    open: 'A shared Alexandria link.'
  };

  if (!KNOWN[first]) {
    // Unknown path — just send them home.
    location.replace('/');
    return;
  }

  var deep = 'alexandria://' + path + location.search;
  document.getElementById('what').textContent = human[first] || '';
  var btn = document.getElementById('openBtn');
  btn.setAttribute('href', deep);

  function tryOpen() { window.location.href = deep; }

  // Attempt to launch the installed app immediately.
  tryOpen();

  // If we're still here shortly after, the app likely isn't installed —
  // relax the copy toward the download path.
  setTimeout(function () {
    document.getElementById('title').textContent = 'Open in Alexandria';
    document.getElementById('desc').innerHTML =
      'If nothing opened, the app may not be installed on this device.<br />' +
      '<span class="what">' + (human[first] || '') + '</span>';
  }, 1500);

  btn.addEventListener('click', function (e) { e.preventDefault(); tryOpen(); });
})();
</script>
</body>
</html>
